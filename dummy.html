<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yaara Editor UI Concept</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --ink: #17202f;
      --muted: #6b7280;
      --line: #dde1e8;
      --panel: #ffffff;
      --workspace: #edf0f3;
      --blue: #315bc8;
      --blue-soft: #e9efff;
      --coral: #d96855;
      --gold: #b9823b;
      --green: #26836b;
      --shadow: 0 12px 32px rgba(29, 37, 55, 0.12);
      --header-h: 58px;
      --filmstrip-h: 112px;
      --rail-w: 72px;
      --dock-w: 270px;
      --inspector-w: 288px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      background: var(--workspace);
      font-family: "DM Sans", Arial, sans-serif;
      letter-spacing: 0;
    }
    button, input, textarea, select { font: inherit; }
    button { color: inherit; }
    button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible {
      outline: 3px solid rgba(49, 91, 200, 0.24);
      outline-offset: 2px;
    }
    .icon { width: 18px; height: 18px; stroke-width: 1.9; }
    .hidden { display: none !important; }

    .app {
      display: grid;
      grid-template-rows: var(--header-h) minmax(0, 1fr);
      height: 100%;
    }

    .topbar {
      z-index: 20;
      display: grid;
      grid-template-columns: minmax(250px, 1fr) auto minmax(250px, 1fr);
      align-items: center;
      gap: 16px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.96);
    }
    .brand-group, .project-group, .header-actions, .button-row, .inline {
      display: flex;
      align-items: center;
    }
    .brand-group { min-width: 0; gap: 10px; }
    .brand-mark {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      flex: 0 0 auto;
      border-radius: 8px;
      color: white;
      background: var(--ink);
    }
    .project-group { min-width: 0; gap: 9px; }
    .project-copy { min-width: 0; }
    .project-copy small { display: block; color: var(--muted); font-size: 10px; line-height: 1; }
    .project-title {
      width: min(260px, 25vw);
      padding: 2px 0;
      border: 0;
      color: var(--ink);
      background: transparent;
      font-size: 14px;
      font-weight: 700;
    }
    .save-status { color: var(--green); font-size: 11px; white-space: nowrap; }
    .history { justify-content: center; gap: 3px; }
    .header-actions { justify-content: flex-end; gap: 7px; }

    .icon-btn, .tool-btn, .tiny-btn, .primary-btn, .secondary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid transparent;
      cursor: pointer;
      transition: background .16s ease, border-color .16s ease, transform .16s ease, color .16s ease;
    }
    .icon-btn:hover, .tool-btn:hover, .tiny-btn:hover, .secondary-btn:hover { background: #f1f3f6; }
    .icon-btn:active, .tool-btn:active, .primary-btn:active, .secondary-btn:active { transform: translateY(1px); }
    .icon-btn { width: 36px; height: 36px; border-radius: 7px; background: transparent; }
    .secondary-btn, .primary-btn {
      min-height: 36px;
      gap: 7px;
      padding: 0 12px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 700;
    }
    .secondary-btn { border-color: var(--line); background: white; }
    .primary-btn { color: white; background: var(--ink); }
    .primary-btn.blue { background: var(--blue); }
    .avatar {
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      color: white;
      background: var(--coral);
      font-size: 11px;
      font-weight: 700;
    }

    .editor {
      position: relative;
      display: grid;
      grid-template-columns: var(--rail-w) var(--dock-w) minmax(360px, 1fr) var(--inspector-w);
      min-height: 0;
    }

    .tool-rail {
      z-index: 12;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 10px 7px;
      border-right: 1px solid var(--line);
      background: #f9fafb;
      overflow-y: auto;
    }
    .rail-tool {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: 58px;
      min-height: 52px;
      padding: 5px 2px;
      border: 0;
      border-radius: 7px;
      color: #596273;
      background: transparent;
      cursor: pointer;
      font-size: 9px;
      font-weight: 600;
    }
    .rail-tool:hover { color: var(--ink); background: #eef1f5; }
    .rail-tool.active { color: var(--blue); background: var(--blue-soft); }
    .rail-tool.admin-tool { color: #8d5b18; }
    .rail-tool.admin-tool.active { color: #895718; background: #fff2df; }
    .rail-divider { width: 34px; height: 1px; margin: 4px 0; background: var(--line); }
    .rail-spacer { flex: 1; }

    .dock, .inspector {
      z-index: 10;
      display: flex;
      min-width: 0;
      flex-direction: column;
      background: var(--panel);
    }
    .dock { border-right: 1px solid var(--line); }
    .inspector { border-left: 1px solid var(--line); }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 56px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
    }
    .panel-head h2 { margin: 0; font-size: 15px; }
    .panel-head p { margin: 2px 0 0; color: var(--muted); font-size: 10px; }
    .panel-body { min-height: 0; padding: 12px; overflow-y: auto; }
    .panel-body::-webkit-scrollbar, .tool-rail::-webkit-scrollbar { width: 6px; }
    .panel-body::-webkit-scrollbar-thumb, .tool-rail::-webkit-scrollbar-thumb { border-radius: 10px; background: #c8cdd5; }

    .search {
      position: relative;
      margin-bottom: 12px;
    }
    .search .icon { position: absolute; top: 10px; left: 10px; width: 15px; color: var(--muted); }
    .search input {
      width: 100%;
      height: 36px;
      padding: 0 10px 0 32px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #f8f9fb;
      font-size: 12px;
    }
    .chips { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; scrollbar-width: none; }
    .chip {
      flex: 0 0 auto;
      padding: 6px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: white;
      cursor: pointer;
      font-size: 10px;
      font-weight: 700;
    }
    .chip.active { color: var(--blue); border-color: #afc1f4; background: var(--blue-soft); }
    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 14px 0 8px;
      font-size: 11px;
      font-weight: 700;
    }
    .section-title span { color: var(--muted); font-size: 9px; font-weight: 600; }
    .template-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 9px; }
    .template-card {
      position: relative;
      aspect-ratio: 1;
      padding: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #ece7df;
      cursor: pointer;
    }
    .template-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .template-card:hover { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(49,91,200,.11); }
    .template-card.selected { border: 2px solid var(--blue); }
    .template-card.selected::after {
      content: "✓";
      position: absolute;
      top: 6px;
      right: 6px;
      display: grid;
      place-items: center;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      color: white;
      background: var(--blue);
      font-size: 11px;
      font-weight: 700;
    }
    .upload-tile {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      min-height: 70px;
      border: 1px dashed #9da7b5;
      border-radius: 7px;
      color: #4f5b6d;
      background: #f8f9fb;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
    }

    .workspace {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      background-color: var(--workspace);
      background-image: radial-gradient(#cdd2d9 0.7px, transparent 0.7px);
      background-size: 16px 16px;
    }
    .workspace-toolbar {
      position: absolute;
      z-index: 8;
      top: 12px;
      left: 50%;
      display: flex;
      align-items: center;
      gap: 4px;
      max-width: calc(100% - 24px);
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.96);
      box-shadow: 0 6px 18px rgba(39,47,60,.09);
      transform: translateX(-50%);
    }
    .tool-btn {
      min-width: 34px;
      height: 32px;
      gap: 6px;
      padding: 0 8px;
      border-radius: 6px;
      background: transparent;
      white-space: nowrap;
      font-size: 10px;
      font-weight: 700;
    }
    .tool-btn.active { color: var(--blue); background: var(--blue-soft); }
    .tool-separator { width: 1px; height: 20px; margin: 0 2px; background: var(--line); }
    .page-count { padding: 0 7px; color: var(--muted); font-size: 10px; font-weight: 700; white-space: nowrap; }

    .canvas-stage {
      position: absolute;
      inset: 58px 0 var(--filmstrip-h);
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .page {
      position: relative;
      width: min(64vh, 63vw, 620px);
      aspect-ratio: 1;
      overflow: hidden;
      background: #e8d6bd url("public/template-assets/background/template_background_1783795849909_gbw98i.jpg") center / cover no-repeat;
      box-shadow: 0 18px 50px rgba(37, 43, 55, .2), 0 0 0 1px rgba(69, 58, 43, .14);
    }
    .safe-area { position: absolute; inset: 3%; border: 1px dashed rgba(176,62,62,.35); pointer-events: none; }
    .page-badge {
      position: absolute;
      left: 18px;
      top: 16px;
      padding: 5px 7px;
      border-radius: 5px;
      color: white;
      background: rgba(23,32,47,.78);
      font-size: 9px;
      font-weight: 700;
    }
    .photo {
      position: absolute;
      overflow: hidden;
      background: #d7d9dd;
      cursor: move;
    }
    .photo img { width: 100%; height: 100%; display: block; object-fit: cover; }
    .photo.one { left: 13.1%; top: 21%; width: 38.5%; height: 29.5%; }
    .photo.two { left: 57.3%; top: 42%; width: 24.5%; height: 24.5%; transform: rotate(3deg); }
    .photo.three { left: 18%; top: 55%; width: 29%; height: 29%; transform: rotate(-8deg); }
    .photo.four { left: 51.7%; top: 70.7%; width: 38.5%; height: 23%; }
    .selection {
      position: absolute;
      inset: -3px;
      border: 2px solid #1575e8;
      pointer-events: none;
    }
    .selection::before, .selection::after {
      content: "";
      position: absolute;
      width: 9px;
      height: 9px;
      border: 2px solid white;
      border-radius: 50%;
      background: #1575e8;
    }
    .selection::before { left: -6px; top: -6px; }
    .selection::after { right: -6px; bottom: -6px; }
    .floating-object-tools {
      position: absolute;
      left: 50%;
      bottom: calc(var(--filmstrip-h) + 12px);
      z-index: 7;
      display: flex;
      gap: 3px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      box-shadow: 0 8px 24px rgba(26,34,48,.14);
      transform: translateX(-50%);
    }
    .tiny-btn { width: 31px; height: 29px; border-radius: 5px; background: white; }
    .tiny-btn .icon { width: 15px; height: 15px; }

    .filmstrip {
      position: absolute;
      z-index: 6;
      right: 0;
      bottom: 0;
      left: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      height: var(--filmstrip-h);
      padding: 10px 16px;
      border-top: 1px solid var(--line);
      background: rgba(248,249,251,.97);
      overflow-x: auto;
    }
    .page-thumb {
      position: relative;
      flex: 0 0 auto;
      width: 72px;
      aspect-ratio: 1;
      overflow: hidden;
      border: 1px solid #cfd4dc;
      border-radius: 5px;
      background: white;
      cursor: pointer;
    }
    .page-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .page-thumb.active { border: 2px solid var(--blue); box-shadow: 0 0 0 2px rgba(49,91,200,.13); }
    .thumb-number { position: absolute; right: 4px; bottom: 3px; padding: 1px 4px; border-radius: 3px; color: white; background: rgba(23,32,47,.72); font-size: 8px; }
    .add-page {
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      width: 72px;
      aspect-ratio: 1;
      border: 1px dashed #9ba4b1;
      border-radius: 5px;
      color: #596273;
      background: transparent;
      cursor: pointer;
    }
    .zoom-control {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-left: auto;
      padding-left: 8px;
      background: #f8f9fb;
      position: sticky;
      right: 0;
    }
    .zoom-label { min-width: 38px; text-align: center; color: var(--muted); font-size: 10px; font-weight: 700; }

    .inspector-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
    }
    .inspector-tab {
      height: 30px;
      border: 0;
      border-radius: 6px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      font-size: 10px;
      font-weight: 700;
    }
    .inspector-tab.active { color: var(--blue); background: var(--blue-soft); }
    .property-group { padding: 12px 0; border-bottom: 1px solid #e8ebef; }
    .property-group:first-child { padding-top: 0; }
    .property-title { margin: 0 0 9px; font-size: 10px; font-weight: 700; text-transform: uppercase; color: #4d5665; }
    .field-label { display: flex; justify-content: space-between; margin: 9px 0 5px; color: #596273; font-size: 10px; font-weight: 600; }
    .control-input, .control-select, .control-textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fafbfc;
      color: var(--ink);
      font-size: 11px;
    }
    .control-input, .control-select { height: 34px; padding: 0 9px; }
    .control-textarea { min-height: 74px; padding: 8px; resize: vertical; }
    input[type="range"] { width: 100%; accent-color: var(--blue); }
    .segmented { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; padding: 3px; border-radius: 7px; background: #f0f2f5; }
    .segmented button { height: 29px; border: 0; border-radius: 5px; background: transparent; cursor: pointer; }
    .segmented button.active { color: var(--blue); background: white; box-shadow: 0 1px 4px rgba(28,34,45,.12); }
    .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .action-grid .secondary-btn { width: 100%; padding: 0 6px; }
    .color-row { display: flex; gap: 7px; }
    .swatch { width: 27px; height: 27px; border: 2px solid white; border-radius: 50%; box-shadow: 0 0 0 1px #cbd0d7; cursor: pointer; }
    .swatch.active { box-shadow: 0 0 0 2px var(--blue); }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 7px 0; font-size: 11px; font-weight: 600; }
    .switch { position: relative; width: 36px; height: 21px; border: 0; border-radius: 999px; background: #c9ced6; cursor: pointer; }
    .switch::after { content: ""; position: absolute; top: 3px; left: 3px; width: 15px; height: 15px; border-radius: 50%; background: white; transition: transform .18s ease; }
    .switch.on { background: var(--blue); }
    .switch.on::after { transform: translateX(15px); }

    .admin-banner {
      margin-bottom: 12px;
      padding: 10px;
      border-left: 3px solid var(--gold);
      background: #fff7ea;
      font-size: 10px;
      line-height: 1.45;
    }
    .admin-banner strong { display: block; color: #784b12; font-size: 11px; }

    .toast {
      position: fixed;
      z-index: 50;
      left: 50%;
      bottom: 126px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 13px;
      border-radius: 7px;
      color: white;
      background: var(--ink);
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 10px);
      transition: opacity .2s ease, transform .2s ease;
      font-size: 11px;
      font-weight: 700;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    .mobile-menu { display: none; }

    @media (max-width: 1120px) {
      :root { --dock-w: 248px; --inspector-w: 260px; }
      .tool-btn span, .secondary-btn .optional { display: none; }
      .tool-btn { padding: 0 7px; }
      .page { width: min(58vh, 52vw, 540px); }
    }

    @media (max-width: 900px) {
      :root { --rail-w: 64px; --dock-w: 250px; --inspector-w: 270px; --filmstrip-h: 96px; }
      .topbar { grid-template-columns: 1fr auto; }
      .history { display: none; }
      .editor { grid-template-columns: var(--rail-w) var(--dock-w) minmax(0, 1fr); }
      .inspector { position: absolute; top: 0; right: 0; bottom: 0; width: var(--inspector-w); box-shadow: -12px 0 28px rgba(33,42,56,.14); }
      .inspector.closed { display: none; }
      .page { width: min(58vh, 51vw, 500px); }
      .header-actions .share-label { display: none; }
    }

    @media (max-width: 680px) {
      :root { --header-h: 54px; --filmstrip-h: 84px; }
      body { overflow: hidden; }
      .topbar { gap: 6px; padding: 0 8px; }
      .brand-mark { width: 32px; height: 32px; }
      .project-copy small, .save-status, .header-actions .secondary-btn, .header-actions .avatar { display: none; }
      .project-title { width: min(44vw, 180px); }
      .editor { display: block; }
      .tool-rail {
        position: absolute;
        z-index: 25;
        right: 0;
        bottom: 0;
        left: 0;
        height: 62px;
        flex-direction: row;
        justify-content: space-around;
        padding: 5px 4px;
        border-top: 1px solid var(--line);
        border-right: 0;
        background: white;
        overflow-x: auto;
      }
      .rail-tool { flex: 0 0 54px; min-height: 48px; }
      .rail-divider, .rail-spacer, .rail-tool.mobile-hide { display: none; }
      .dock {
        position: absolute;
        z-index: 24;
        right: 0;
        bottom: 62px;
        left: 0;
        height: min(56vh, 430px);
        border-top: 1px solid var(--line);
        border-right: 0;
        box-shadow: 0 -14px 34px rgba(33,42,56,.15);
        transform: translateY(0);
        transition: transform .22s ease;
      }
      .dock.closed { transform: translateY(calc(100% + 2px)); pointer-events: none; }
      .panel-head { min-height: 48px; }
      .panel-head::before { content: ""; position: absolute; top: 6px; left: 50%; width: 38px; height: 4px; border-radius: 999px; background: #cbd0d7; transform: translateX(-50%); }
      .workspace { position: absolute; inset: 0 0 62px; }
      .workspace-toolbar { top: 8px; }
      .workspace-toolbar .desktop-only, .tool-separator.desktop-only { display: none; }
      .canvas-stage { inset: 48px 0 var(--filmstrip-h); padding: 12px; }
      .page { width: min(76vw, 51vh, 430px); }
      .filmstrip { padding: 7px 10px; gap: 7px; }
      .page-thumb, .add-page { width: 60px; }
      .zoom-control { display: none; }
      .floating-object-tools { bottom: calc(var(--filmstrip-h) + 8px); }
      .inspector {
        position: absolute;
        z-index: 30;
        top: auto;
        right: 0;
        bottom: 62px;
        left: 0;
        width: auto;
        height: min(62vh, 480px);
        border-top: 1px solid var(--line);
        border-left: 0;
        box-shadow: 0 -14px 34px rgba(33,42,56,.17);
      }
      .toast { bottom: 76px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition-duration: .01ms !important; animation-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand-group">
        <div class="brand-mark" title="Yaara"><i data-lucide="book-open" class="icon"></i></div>
        <div class="project-group">
          <div class="project-copy">
            <small>PROJECT</small>
            <input class="project-title" value="My Yaara Book" aria-label="Project title" />
          </div>
          <span class="save-status">Saved</span>
        </div>
      </div>

      <div class="history button-row" aria-label="History controls">
        <button class="icon-btn demo-action" title="Undo"><i data-lucide="undo-2" class="icon"></i></button>
        <button class="icon-btn demo-action" title="Redo"><i data-lucide="redo-2" class="icon"></i></button>
      </div>

      <div class="header-actions">
        <button class="secondary-btn demo-action"><i data-lucide="eye" class="icon"></i><span class="optional">Preview</span></button>
        <button class="secondary-btn demo-action"><i data-lucide="share-2" class="icon"></i><span class="share-label">Share</span></button>
        <button class="primary-btn demo-action"><i data-lucide="download" class="icon"></i><span class="optional">Export</span></button>
        <div class="avatar" title="Account">KM</div>
      </div>
    </header>

            <div class="photo three" tabindex="0"><img src="https://images.unsplash.com/photo-1483347756197-71ef80e95f73?auto=format&fit=crop&w=500&q=82" alt="Traveler portrait" /></div>

          <button class="page-thumb active"><img src="public/template-assets/background/template_background_1783795849909_gbw98i.jpg" alt="Page 3" /><span class="thumb-number">3</span></button>

              <button title="Move forward"><i data-lucide="chevron-up" class="icon"></i></button>

  </main>

  <div class="toast" id="toast"><i data-lucide="check" class="icon"></i><span>Action previewed</span></div>

  <script>
    const assets = [
      "template_background_1783795849909_gbw98i.jpg",
      "template_background_1783795849794_g58n87.jpg",
      "template_background_1783795849717_76gdwo.jpg",
      "template_background_1783795849636_rc4jb7.jpg",
      "template_background_1783795849586_ssnlfz.jpg",
      "template_background_1783795849484_cbtw0n.jpg"
    ];
    const assetPath = name => `public/template-assets/background/${name}`;
    const dock = document.getElementById("dock");
    const inspector = document.getElementById("inspector");
    const dockTitle = document.getElementById("dockTitle");
    const dockSubtitle = document.getElementById("dockSubtitle");
    const dockContent = document.getElementById("dockContent");
    const adminRail = document.getElementById("adminRail");
    let adminMode = false;
    let zoom = 78;

    const search = placeholder => `<div class="search"><i data-lucide="search" class="icon"></i><input aria-label="Search" placeholder="${placeholder}" /></div>`;
    const templateCards = () => `<div class="chips"><button class="chip active">Recommended</button><button class="chip">Travel</button><button class="chip">Magazine</button><button class="chip">Minimal</button></div><div class="section-title">Page templates <span>48 designs</span></div><div class="template-grid">${assets.map((a,i) => `<button class="template-card ${i === 0 ? "selected" : ""}" title="Apply template ${i + 1}"><img src="${assetPath(a)}" alt="Template preview ${i + 1}" /></button>`).join("")}</div>`;
    const toolViews = {
      pages: { title: "Pages", subtitle: "Organize your book", html: `${search("Search pages...")}<button class="upload-tile demo-action"><i data-lucide="plus" class="icon"></i>Add a new page</button><div class="section-title">Book structure <span>12 pages</span></div>${templateCards()}` },
      media: { title: "Media", subtitle: "Photos in this project", html: `<button class="upload-tile demo-action"><i data-lucide="upload" class="icon"></i>Upload photos</button>${search("Search your photos...")}<div class="chips"><button class="chip active">All</button><button class="chip">Unused</button><button class="chip">Favorites</button></div><div class="template-grid">${["1500530855697-b586d89ba3ee","1500534314209-a25ddb2bd429","1483347756197-71ef80e95f73","1501785888041-af3ef285b470"].map((id,i)=>`<button class="template-card"><img src="https://images.unsplash.com/photo-${id}?auto=format&fit=crop&w=400&q=76" alt="Uploaded photo ${i+1}" /></button>`).join("")}</div>` },
      templates: { title: "Templates", subtitle: "Choose a complete page design", html: `${search("Search templates...")}${templateCards()}` },
      text: { title: "Text", subtitle: "Write and style your story", html: `<button class="primary-btn blue demo-action" style="width:100%"><i data-lucide="plus" class="icon"></i>Add text box</button><div class="section-title">Quick styles</div><button class="upload-tile demo-action" style="font-family:'Playfair Display';font-size:22px">Add a heading</button><button class="upload-tile demo-action" style="margin-top:8px;font-size:13px">Add body text</button><div class="section-title">Text presets <span>Editable</span></div><div class="template-grid"><button class="template-card" style="font-family:'Playfair Display';font-size:18px;background:#fff7ea">Our story</button><button class="template-card" style="font-size:17px;background:#e9efff">BEST DAY</button><button class="template-card" style="font-family:'Playfair Display';font-style:italic;background:#f3e5e2">with love</button><button class="template-card" style="background:#17202f;color:white">MEMORIES</button></div>` },
      stickers: { title: "Stickers", subtitle: "Global and project stickers", html: `<button class="upload-tile demo-action"><i data-lucide="upload" class="icon"></i>Upload project sticker</button>${search("Search stickers...")}<div class="chips"><button class="chip active">Travel</button><button class="chip">Love</button><button class="chip">Paper</button></div><div class="template-grid"><button class="template-card" style="font-size:44px;background:#fff7ea">✈</button><button class="template-card" style="font-size:44px;background:#f3e5e2">♥</button><button class="template-card" style="font-size:40px;background:#e8f2ed">✿</button><button class="template-card" style="font-size:40px;background:#e9efff">★</button></div>` },
      draw: { title: "Draw", subtitle: "Pens, markers and eraser", html: `<div class="section-title">Brush</div><div class="chips"><button class="chip active">Pen</button><button class="chip">Marker</button><button class="chip">Neon</button><button class="chip">Spray</button></div><div class="property-group"><div class="field-label"><span>Size</span><span>8 px</span></div><input type="range" min="1" max="80" value="8"><div class="field-label"><span>Opacity</span><span>100%</span></div><input type="range" min="0" max="100" value="100"></div><div class="section-title">Color</div><div class="color-row"><button class="swatch active" style="background:#17202f"></button><button class="swatch" style="background:#315bc8"></button><button class="swatch" style="background:#d96855"></button><button class="swatch" style="background:#b9823b"></button></div>` },
      frames: { title: "Frames", subtitle: "Photo masks and borders", html: `${search("Search frames...")}<div class="chips"><button class="chip active">All</button><button class="chip">Classic</button><button class="chip">Scrapbook</button></div><div class="template-grid"><button class="template-card" style="background:#eef0f3"><span style="display:block;width:70%;height:70%;margin:15%;border:5px solid white;box-shadow:0 2px 8px #aaa"></span></button><button class="template-card" style="background:#eef0f3"><span style="display:block;width:70%;height:70%;margin:15%;border:6px double #b9823b"></span></button><button class="template-card" style="background:#eef0f3"><span style="display:block;width:70%;height:70%;margin:15%;border:7px solid #17202f"></span></button><button class="template-card" style="background:#eef0f3"><span style="display:block;width:68%;height:76%;margin:10% 16%;border:7px solid white;border-bottom-width:22px;transform:rotate(-5deg)"></span></button></div>` },
      backgrounds: { title: "Background", subtitle: "Published global backgrounds", html: `<button class="upload-tile demo-action"><i data-lucide="upload" class="icon"></i>Upload for this project</button>${search("Search backgrounds...")}<div class="template-grid">${assets.map((a,i)=>`<button class="template-card"><img src="${assetPath(a)}" alt="Background ${i+1}"></button>`).join("")}</div>` },
      more: { title: "More tools", subtitle: "Extra creative features", html: `<div class="section-title">Create</div><div class="action-grid"><button class="secondary-btn demo-action"><i data-lucide="qr-code" class="icon"></i>QR code</button><button class="secondary-btn demo-action"><i data-lucide="table-2" class="icon"></i>Table</button><button class="secondary-btn demo-action"><i data-lucide="map" class="icon"></i>Map</button><button class="secondary-btn demo-action"><i data-lucide="calendar" class="icon"></i>Date</button></div><div class="section-title">Integrations</div><button class="upload-tile demo-action"><i data-lucide="cloud" class="icon"></i>Import from cloud</button>` },
      settings: { title: "Editor settings", subtitle: "View and project preferences", html: `<div class="toggle-row"><span>Show safe area</span><button class="switch on"></button></div><div class="toggle-row"><span>Snap to guides</span><button class="switch on"></button></div><div class="toggle-row"><span>Show rulers</span><button class="switch"></button></div><div class="toggle-row"><span>Admin mode</span><button class="switch" id="adminSwitch"></button></div><div class="property-group"><div class="field-label"><span>Page format</span></div><select class="control-select"><option>5.5 x 5.5 square</option></select></div>` },
      admin: { title: "Admin Studio", subtitle: "Protected publishing controls", html: `<div class="admin-banner"><strong>Admin-only workspace</strong>These controls never appear for normal users.</div><div class="action-grid"><button class="secondary-btn demo-action"><i data-lucide="sparkles" class="icon"></i>Magic layout</button><button class="secondary-btn demo-action"><i data-lucide="save" class="icon"></i>Replace template</button><button class="secondary-btn demo-action"><i data-lucide="lock-keyhole" class="icon"></i>Lock design</button><button class="secondary-btn demo-action"><i data-lucide="upload-cloud" class="icon"></i>Publish asset</button></div><div class="section-title">Template metadata</div><label class="field-label">Template name</label><input class="control-input" value="Memories Box"><label class="field-label">Category</label><select class="control-select"><option>Travel Mag</option><option>Friendship Mag</option><option>General Mag</option></select><div class="toggle-row"><span>Users can edit text</span><button class="switch on"></button></div><div class="toggle-row"><span>Users can move frames</span><button class="switch"></button></div><div class="toggle-row"><span>Users can change background</span><button class="switch"></button></div>` }
    };

    function refreshIcons() { if (window.lucide) window.lucide.createIcons(); }
    function bindPanelActions() {
      dockContent.querySelectorAll(".template-card").forEach(card => card.addEventListener("click", () => {
        dockContent.querySelectorAll(".template-card").forEach(c => c.classList.remove("selected"));
        card.classList.add("selected");
        showToast("Design applied to current page");
      }));
      dockContent.querySelectorAll(".chip").forEach(chip => chip.addEventListener("click", () => {
        chip.parentElement.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
        chip.classList.add("active");
      }));
      dockContent.querySelectorAll(".switch").forEach(toggle => toggle.addEventListener("click", () => toggle.classList.toggle("on")));
      const adminSwitch = document.getElementById("adminSwitch");
      if (adminSwitch) adminSwitch.addEventListener("click", () => {
        adminMode = !adminMode;
        adminSwitch.classList.toggle("on", adminMode);
        adminRail.classList.toggle("hidden", !adminMode);
        showToast(adminMode ? "Admin tools enabled" : "Admin tools hidden");
      });
      document.querySelectorAll(".demo-action").forEach(button => button.onclick = () => showToast(`${button.textContent.trim() || button.title} is available in this layout`));
      refreshIcons();
    }
    function openTool(name) {
      const view = toolViews[name] || toolViews.templates;
      dockTitle.textContent = view.title;
      dockSubtitle.textContent = view.subtitle;
      dockContent.innerHTML = view.html;
      dock.classList.remove("closed");
      document.querySelectorAll(".rail-tool").forEach(button => button.classList.toggle("active", button.dataset.tool === name));
      bindPanelActions();
    }
    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.querySelector("span").textContent = message;
      toast.classList.add("show");
      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => toast.classList.remove("show"), 1700);
    }

    document.querySelectorAll(".rail-tool").forEach(button => button.addEventListener("click", () => openTool(button.dataset.tool)));
    document.getElementById("closeDock").addEventListener("click", () => dock.classList.add("closed"));
    document.getElementById("closeInspector").addEventListener("click", () => inspector.classList.add("closed"));
    document.getElementById("openInspector").addEventListener("click", () => inspector.classList.remove("closed"));
    document.getElementById("cropButton").addEventListener("click", () => showToast("Crop mode ready: drag the image inside its frame"));
    document.getElementById("quickCrop").addEventListener("click", () => showToast("Crop mode ready: drag the image inside its frame"));
    document.querySelectorAll(".photo").forEach(photo => photo.addEventListener("click", () => {
      document.querySelectorAll(".photo .selection").forEach(s => s.remove());
      const selection = document.createElement("span");
      selection.className = "selection";
      photo.appendChild(selection);
      inspector.classList.remove("closed");
    }));
    document.querySelectorAll(".inspector-tab").forEach(tab => tab.addEventListener("click", () => {
      tab.parentElement.querySelectorAll(".inspector-tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      showToast(`${tab.textContent} properties selected`);
    }));
    document.querySelectorAll(".switch").forEach(toggle => toggle.addEventListener("click", () => toggle.classList.toggle("on")));
    document.querySelectorAll(".swatch").forEach(swatch => swatch.addEventListener("click", () => {
      swatch.parentElement.querySelectorAll(".swatch").forEach(s => s.classList.remove("active"));
      swatch.classList.add("active");
    }));
    document.getElementById("zoomIn").addEventListener("click", () => { zoom = Math.min(150, zoom + 5); document.getElementById("zoomLabel").textContent = `${zoom}%`; });
    document.getElementById("zoomOut").addEventListener("click", () => { zoom = Math.max(25, zoom - 5); document.getElementById("zoomLabel").textContent = `${zoom}%`; });
    document.getElementById("fitPage").addEventListener("click", () => { zoom = 78; document.getElementById("zoomLabel").textContent = "78%"; showToast("Page fitted to workspace"); });
    document.querySelectorAll(".page-thumb").forEach(thumb => thumb.addEventListener("click", () => {
      document.querySelectorAll(".page-thumb").forEach(t => t.classList.remove("active"));
      thumb.classList.add("active");
    }));

    openTool("templates");
    refreshIcons();
  </script>
</body>
</html>
